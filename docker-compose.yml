version: '3.8'

services:
  teleprompteria:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teleprompteria-dev
    ports:
      - "4010:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env.local
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    restart: unless-stopped
